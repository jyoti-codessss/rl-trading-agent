<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stock Trading Agent</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-color: #e0e0e0;
            --accent-green: #00ff88;
            --accent-red: #ff4444;
            --accent-yellow: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            border-bottom: 2px solid var(--accent-green);
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--accent-green);
            margin: 0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item label {
            display: block;
            font-size: 0.8em;
            color: #888;
        }

        .stat-item span {
            font-size: 1.2em;
            font-weight: bold;
        }

        .action-indicator {
            font-size: 2em;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }

        .action-BUY { background-color: rgba(0, 255, 136, 0.2); color: var(--accent-green); }
        .action-SELL { background-color: rgba(255, 68, 68, 0.2); color: var(--accent-red); }
        .action-HOLD { background-color: rgba(255, 204, 0, 0.2); color: var(--accent-yellow); }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th { color: #888; font-weight: normal; }

        .btn {
            background-color: var(--accent-green);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #333;
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-green);
            width: 0%;
            transition: width 0.3s;
        }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>AI Stock Trading Agent</h1>
    </header>

    <div class="dashboard">
        <div class="card">
            <h2>Portfolio Stats</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <label>Total Value</label>
                    <span id="total-value">$10,000.00</span>
                </div>
                <div class="stat-item">
                    <label>Return %</label>
                    <span id="return-pct">0.00%</span>
                </div>
                <div class="stat-item">
                    <label>Shares Held</label>
                    <span id="shares-held">0</span>
                </div>
                <div class="stat-item">
                    <label>Available Cash</label>
                    <span id="available-cash">$10,000.00</span>
                </div>
            </div>
            <div id="action-display" class="action-indicator action-HOLD">HOLD</div>
        </div>

        <div class="card">
            <h2>Training</h2>
            <button id="train-btn" class="btn">TRAIN AGENT</button>
            <div id="progress-container" class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="training-status" style="margin-top: 10px; color: #888;">Ready to train</p>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Price Chart (AAPL)</h2>
            <div class="chart-container">
                <canvas id="priceChart"></canvas>
            </div>
        </div>
        <div class="card">
            <h2>Portfolio Value</h2>
            <div class="chart-container">
                <canvas id="portfolioChart"></canvas>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Trade History</h2>
        <div style="overflow-x: auto;">
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Action</th>
                        <th>Price</th>
                        <th>Confidence</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- History rows will be added here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8080';
        let priceChart, portfolioChart;

        async function initCharts() {
            const ctxPrice = document.getElementById('priceChart').getContext('2d');
            priceChart = new Chart(ctxPrice, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Stock Price',
                        borderColor: '#00ff88',
                        data: [],
                        fill: false,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { grid: { color: '#333' } }, x: { grid: { display: false } } }
                }
            });

            const ctxPortfolio = document.getElementById('portfolioChart').getContext('2d');
            portfolioChart = new Chart(ctxPortfolio, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Portfolio Value',
                        borderColor: '#00ff88',
                        backgroundColor: 'rgba(0, 255, 136, 0.1)',
                        data: [],
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { grid: { color: '#333' } }, x: { grid: { display: false } } }
                }
            });
        }

        async function updateData() {
            try {
                // Fetch Predict
                const predRes = await fetch(`${API_URL}/predict`);
                const prediction = await predRes.json();
                
                if (!prediction.error) {
                    const actionDisplay = document.getElementById('action-display');
                    actionDisplay.textContent = prediction.action;
                    actionDisplay.className = `action-indicator action-${prediction.action}`;
                    
                    // Update Charts
                    const time = new Date().toLocaleTimeString();
                    
                    if (priceChart.data.labels.length > 20) {
                        priceChart.data.labels.shift();
                        priceChart.data.datasets[0].data.shift();
                    }
                    priceChart.data.labels.push(time);
                    priceChart.data.datasets[0].data.push(prediction.current_price);
                    priceChart.update();
                    
                    // Update History Table
                    const tableBody = document.querySelector('#history-table tbody');
                    const row = `<tr>
                        <td>${new Date(prediction.timestamp).toLocaleString()}</td>
                        <td style="color: ${prediction.action === 'BUY' ? '#00ff88' : prediction.action === 'SELL' ? '#ff4444' : '#ffcc00'}">${prediction.action}</td>
                        <td>$${prediction.current_price.toFixed(2)}</td>
                        <td>${(prediction.confidence * 100).toFixed(1)}%</td>
                    </tr>`;
                    tableBody.insertAdjacentHTML('afterbegin', row);
                }

                // Fetch Portfolio
                const portRes = await fetch(`${API_URL}/portfolio`);
                const portfolio = await portRes.json();
                
                document.getElementById('total-value').textContent = `$${portfolio.value.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                document.getElementById('return-pct').textContent = `${portfolio.return.toFixed(2)}%`;
                document.getElementById('shares-held').textContent = portfolio.shares;
                document.getElementById('available-cash').textContent = `$${portfolio.cash.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
                
                const time = new Date().toLocaleTimeString();
                if (portfolioChart.data.labels.length > 20) {
                    portfolioChart.data.labels.shift();
                    portfolioChart.data.datasets[0].data.shift();
                }
                portfolioChart.data.labels.push(time);
                portfolioChart.data.datasets[0].data.push(portfolio.value);
                portfolioChart.update();

            } catch (err) {
                console.error("Fetch error:", err);
            }
        }

        async function checkTrainingStatus() {
            try {
                const res = await fetch(`${API_URL}/status`);
                const status = await res.json();
                
                const trainBtn = document.getElementById('train-btn');
                const progressContainer = document.getElementById('progress-container');
                const progressFill = document.getElementById('progress-fill');
                const statusText = document.getElementById('training-status');
                
                if (status.status === 'training') {
                    trainBtn.disabled = true;
                    progressContainer.style.display = 'block';
                    progressFill.style.width = `${status.progress}%`;
                    statusText.textContent = `Training... ${status.progress}%`;
                } else {
                    trainBtn.disabled = false;
                    progressContainer.style.display = 'none';
                    statusText.textContent = status.status === 'completed' ? 'Training Complete' : 'Ready to train';
                }
            } catch (err) {
                console.error("Status error:", err);
            }
        }

        document.getElementById('train-btn').addEventListener('click', async () => {
            await fetch(`${API_URL}/train`);
            checkTrainingStatus();
        });

        initCharts();
        setInterval(updateData, 5000);
        setInterval(checkTrainingStatus, 2000);
        updateData();
    </script>
</body>
</html>
